<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Luma — Offline</title>
<style>
  :root { color-scheme: dark }
  * { box-sizing: border-box }
  html, body { margin: 0; height: 100% }
  body {
    background: #0e0c09;
    color: #efe7d8;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100svh; padding: 2rem; text-align: center; gap: 1.25rem;
  }
  .mark {
    width: 84px; height: 84px; border-radius: 50%;
    background: linear-gradient(135deg, #f2b54e, #cf8327);
    display: flex; align-items: center; justify-content: center;
    font-family: Georgia, serif; font-weight: 700; font-size: 2.4rem; color: #0e0c09;
    box-shadow: 0 0 48px 6px rgba(232,165,58,.4);
  }
  h1 { font-family: Georgia, "Cormorant Garamond", serif; font-weight: 500; font-size: 1.7rem; margin: 0; letter-spacing: .01em }
  p { margin: 0; max-width: 30ch; line-height: 1.6; color: #b8ab95; font-size: .98rem }
  button {
    margin-top: .25rem; padding: .7rem 1.5rem; border: 1px solid rgba(232,165,58,.45);
    background: transparent; color: #f2b54e; border-radius: 999px; font-size: .95rem;
    cursor: pointer; transition: background .2s ease;
  }
  button:hover { background: rgba(232,165,58,.1) }
</style>
</head>
<body>
  <div class="mark">L</div>
  <h1>You're offline</h1>
  <p>Luma needs a connection to load your day. Your data is safe — reconnect and it'll be right here.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
